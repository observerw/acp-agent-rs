default_install_hook_types:
  - pre-commit
  - pre-push

exclude: ^(references/|target/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        files: \.rs$

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --locked -- -D warnings
        language: system
        pass_filenames: false
        files: \.rs$

      - id: cargo-test
        name: cargo test
        entry: cargo test --locked
        language: system
        pass_filenames: false
        stages:
          - pre-push
